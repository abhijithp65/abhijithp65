<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
<defs>

  <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#020d18"/>
    <stop offset="100%" stop-color="#010810"/>
  </linearGradient>

  <linearGradient id="w1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0066ff" stop-opacity="0"/>
    <stop offset="30%"  stop-color="#00aaff" stop-opacity=".5"/>
    <stop offset="60%"  stop-color="#00eeff" stop-opacity=".8"/>
    <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="w2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0044cc" stop-opacity="0"/>
    <stop offset="40%"  stop-color="#0088dd" stop-opacity=".4"/>
    <stop offset="70%"  stop-color="#00ccff" stop-opacity=".7"/>
    <stop offset="100%" stop-color="#0044cc" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="w3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#003399" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#0077cc" stop-opacity=".35"/>
    <stop offset="100%" stop-color="#003399" stop-opacity="0"/>
  </linearGradient>

  <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0066ff" stop-opacity="0"/>
    <stop offset="30%"  stop-color="#00aaff"/>
    <stop offset="50%"  stop-color="#00eeff"/>
    <stop offset="70%"  stop-color="#00aaff"/>
    <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
  </linearGradient>

  <radialGradient id="dot" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00eeff" stop-opacity="1"/>
    <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
  </radialGradient>

  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

</defs>

<!-- Background -->
<rect width="900" height="120" fill="url(#bg)"/>

<!-- Deep wave -->
<path fill="url(#w3)" opacity=".4">
  <animate attributeName="d" dur="8s" repeatCount="indefinite" calcMode="spline"
    keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
    values="
      M-100 80 C 50 65, 200 95, 350 75 S 600 55, 750 72 S 900 85, 1000 78 L 1000 120 L -100 120 Z;
      M-100 78 C 50 90, 200 60, 350 80 S 600 95, 750 68 S 900 75, 1000 82 L 1000 120 L -100 120 Z;
      M-100 80 C 50 65, 200 95, 350 75 S 600 55, 750 72 S 900 85, 1000 78 L 1000 120 L -100 120 Z"/>
</path>

<!-- Mid wave -->
<path fill="url(#w2)" opacity=".55">
  <animate attributeName="d" dur="5.5s" repeatCount="indefinite" calcMode="spline"
    keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
    values="
      M-100 88 C 100 72, 280 100, 450 82 S 680 65, 850 85 L 1000 80 L 1000 120 L -100 120 Z;
      M-100 82 C 100 96, 280 68, 450 88 S 680 102, 850 78 L 1000 88 L 1000 120 L -100 120 Z;
      M-100 88 C 100 72, 280 100, 450 82 S 680 65, 850 85 L 1000 80 L 1000 120 L -100 120 Z"/>
</path>

<!-- Front wave -->
<path fill="url(#w1)" opacity=".8" filter="url(#softglow)">
  <animate attributeName="d" dur="3.8s" repeatCount="indefinite" calcMode="spline"
    keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
    values="
      M-100 95 C 80 80, 220 108, 400 90 S 620 72, 780 92 S 920 100, 1000 94 L 1000 120 L -100 120 Z;
      M-100 90 C 80 105, 220 82, 400 98 S 620 110, 780 88 S 920 95, 1000 100 L 1000 120 L -100 120 Z;
      M-100 95 C 80 80, 220 108, 400 90 S 620 72, 780 92 S 920 100, 1000 94 L 1000 120 L -100 120 Z"/>
</path>

<!-- Front crest -->
<path fill="none" stroke="#aaddff" stroke-width="1" opacity=".35">
  <animate attributeName="d" dur="3.8s" repeatCount="indefinite" calcMode="spline"
    keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
    values="
      M-100 95 C 80 80, 220 108, 400 90 S 620 72, 780 92 S 920 100, 1000 94;
      M-100 90 C 80 105, 220 82, 400 98 S 620 110, 780 88 S 920 95, 1000 100;
      M-100 95 C 80 80, 220 108, 400 90 S 620 72, 780 92 S 920 100, 1000 94"/>
</path>

<!-- Mid crest -->
<path fill="none" stroke="#ffffff" stroke-width=".5" opacity=".2">
  <animate attributeName="d" dur="5.5s" repeatCount="indefinite" calcMode="spline"
    keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
    values="
      M-100 88 C 100 72, 280 100, 450 82 S 680 65, 850 85 L 1000 80;
      M-100 82 C 100 96, 280 68, 450 88 S 680 102, 850 78 L 1000 88;
      M-100 88 C 100 72, 280 100, 450 82 S 680 65, 850 85 L 1000 80"/>
</path>

<!-- Floating particles -->
<circle r="2.5" fill="url(#dot)">
  <animateMotion dur="6s" repeatCount="indefinite" path="M 80 75 Q 200 60 320 80 Q 440 95 560 72 Q 680 55 820 78"/>
  <animate attributeName="opacity" values=".9;.3;.9" dur="6s" repeatCount="indefinite"/>
</circle>
<circle r="2" fill="url(#dot)">
  <animateMotion dur="7s" begin="-2s" repeatCount="indefinite" path="M 50 85 Q 180 70 300 88 Q 450 100 600 78 Q 720 62 880 82"/>
  <animate attributeName="opacity" values=".7;.2;.7" dur="7s" repeatCount="indefinite"/>
</circle>
<circle r="1.5" fill="url(#dot)">
  <animateMotion dur="5s" begin="-1s" repeatCount="indefinite" path="M 120 78 Q 260 65 400 84 Q 540 98 680 70 Q 780 58 900 76"/>
  <animate attributeName="opacity" values=".6;.1;.6" dur="5s" repeatCount="indefinite"/>
</circle>
<circle r="1.5" fill="#aaddff">
  <animateMotion dur="8s" begin="-3s" repeatCount="indefinite" path="M 200 92 Q 350 78 480 94 Q 620 108 760 86 Q 850 75 950 90"/>
  <animate attributeName="opacity" values=".5;.1;.5" dur="8s" repeatCount="indefinite"/>
</circle>
<circle r="2" fill="url(#dot)">
  <animateMotion dur="6.5s" begin="-4s" repeatCount="indefinite" path="M 30 82 Q 160 68 290 86 Q 420 100 560 76 Q 700 58 860 80"/>
  <animate attributeName="opacity" values=".65;.2;.65" dur="6.5s" repeatCount="indefinite"/>
</circle>

<!-- Line 1: Building what matters -->
<text x="450" y="38" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="13" font-weight="bold"
  letter-spacing="4" fill="url(#tg)" filter="url(#glow)">
  &lt; BUILDING WHAT MATTERS /&gt;
  <animate attributeName="opacity" values=".85;1;.85" dur="4s" repeatCount="indefinite"/>
</text>

<!-- Line 2: Copyright -->
<text x="450" y="58" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="9"
  letter-spacing="1.5" fill="#005577">
  Copyright &#169; 2026 by Abhijith P. All rights reserved.
</text>

</svg>
